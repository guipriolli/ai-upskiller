# --- ALLOWED (Execute without confirmation) ---

[[rule]]
toolName = "read_file"
decision = "allow"
priority = 100

[[rule]]
toolName = "replace"
decision = "allow"
priority = 100

[[rule]]
toolName = "write_file"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "mvn"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "java"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "npm"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "ng"
decision = "allow"
priority = 100

[[rule]]
